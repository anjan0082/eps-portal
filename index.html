<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPS Employee Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* LOGIN SCREEN */
        .login-screen {
            background: white;
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            margin: 80px auto;
            text-align: center;
        }

        .login-screen h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-screen p {
            color: #999;
            margin-bottom: 40px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .login-error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
        }

        /* DASHBOARD */
        .dashboard {
            display: none;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .dashboard.active {
            display: block;
        }

        .dashboard-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-header h2 {
            font-size: 24px;
        }

        .btn-logout {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid white;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-logout:hover {
            background: rgba(255,255,255,0.3);
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
            background: #f9f9f9;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
        }

        .form-group-dash {
            margin-bottom: 15px;
        }

        .form-group-dash label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
            font-size: 13px;
        }

        .form-group-dash input, .form-group-dash select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
        }

        .btn-submit:hover {
            background: #764ba2;
        }

        .orders-list {
            margin-top: 20px;
        }

        .order-card {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .order-card h4 {
            color: #667eea;
            margin-bottom: 5px;
        }

        .order-card p {
            font-size: 13px;
            color: #666;
            margin: 3px 0;
        }

        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .error-msg {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- LOGIN SCREEN -->
        <div id="loginScreen" class="login-screen active">
            <h1>EPS Employee Portal</h1>
            <p>Login to manage orders</p>
            <div id="loginError" class="login-error" style="display: none;"></div>
            <div class="form-group">
                <label>Employee ID</label>
                <input type="text" id="empId" placeholder="emp001" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="empPassword" placeholder="Enter password" autocomplete="off">
            </div>
            <button class="btn-login" onclick="handleLogin()">Login</button>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard" class="dashboard">
            <div class="dashboard-header">
                <h2>Welcome, <span id="empNameDisplay">Employee</span></h2>
                <button class="btn-logout" onclick="handleLogout()">Logout</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('create')">Create Order</button>
                <button class="tab-btn" onclick="switchTab('orders')">My Orders</button>
                <button class="tab-btn" onclick="switchTab('invoice')">View Invoice</button>
            </div>

            <!-- TAB: CREATE ORDER -->
            <div id="createTab" class="tab-content active">
                <h3>Create New Order</h3>
                <div id="createMsg"></div>
                <form onsubmit="return handleCreateOrder(event)">
                    <div class="form-group-dash">
                        <label>Customer Name</label>
                        <input type="text" id="customerName" required>
                    </div>
                    <div class="form-group-dash">
                        <label>Customer Email</label>
                        <input type="email" id="customerEmail" required>
                    </div>
                    <div class="form-group-dash">
                        <label>Customer Phone</label>
                        <input type="tel" id="customerPhone" required>
                    </div>
                    <div class="form-group-dash">
                        <label>Pickup Address</label>
                        <input type="text" id="pickupAddress" required>
                    </div>
                    <div class="form-group-dash">
                        <label>Pickup Pincode</label>
                        <input type="text" id="pickupPin" required>
                    </div>
                    <div class="form-group-dash">
                        <label>Delivery Address</label>
                        <input type="text" id="deliveryAddress" required>
                    </div>
                    <div class="form-group-dash">
                        <label>Delivery Pincode</label>
                        <input type="text" id="deliveryPin" required>
                    </div>
                    <div class="form-group-dash">
                        <label>Service Type</label>
                        <select id="serviceType" required>
                            <option value="">Select Service</option>
                            <option value="Domestic Parcel">Domestic Parcel</option>
                            <option value="International">International</option>
                            <option value="Courier">Courier</option>
                        </select>
                    </div>
                    <div class="form-group-dash">
                        <label>Weight (kg)</label>
                        <input type="number" id="weight" step="0.1" required>
                    </div>
                    <div class="form-group-dash">
                        <label>Order Amount (₹)</label>
                        <input type="number" id="orderAmount" step="0.01" required>
                    </div>
                    <button type="submit" class="btn-submit">Create Order</button>
                </form>
            </div>

            <!-- TAB: MY ORDERS -->
            <div id="ordersTab" class="tab-content">
                <h3>My Orders</h3>
                <div id="ordersLoading" class="loading" style="display:none;">
                    <div class="spinner"></div>
                    Loading orders...
                </div>
                <div id="ordersList" class="orders-list"></div>
            </div>

            <!-- TAB: INVOICE -->
            <div id="invoiceTab" class="tab-content">
                <h3>View Invoice</h3>
                <div class="form-group-dash">
                    <label>Select Order</label>
                    <select id="invoiceOrderSelect" onchange="loadInvoice()"></select>
                </div>
                <div id="invoicePreview" style="margin-top: 20px; border: 1px solid #ddd; padding: 20px; border-radius: 5px; display: none;">
                    <iframe id="invoiceFrame" style="width: 100%; height: 600px; border: none;"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Supabase
        let sbClient = null;
        
        window.addEventListener('DOMContentLoaded', function() {
            const { createClient } = window.supabase;
            const SUPABASE_URL = 'https://hdanqhtloceossakbmhpn.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_6yARuyaUM2lSgEyBLvM5Gg_T1zwgxRX';
            
            sbClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        });

        // Credentials
        const VALID_CREDENTIALS = {
            'emp001': 'eps@2026worldwide',
            'ops001': 'eps@2026logistics'
        };

        let currentEmployee = null;

        function handleLogin() {
            const empId = document.getElementById('empId').value;
            const password = document.getElementById('empPassword').value;

            if (VALID_CREDENTIALS[empId] && VALID_CREDENTIALS[empId] === password) {
                currentEmployee = empId;
                document.getElementById('empNameDisplay').textContent = empId.toUpperCase();
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadOrders();
            } else {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('loginError').textContent = 'Invalid credentials';
            }
        }

        async function handleCreateOrder(e) {
            e.preventDefault();

            const orderData = {
                employee_id: currentEmployee,
                customer_name: document.getElementById('customerName').value,
                customer_email: document.getElementById('customerEmail').value,
                customer_phone: document.getElementById('customerPhone').value,
                pickup_address: document.getElementById('pickupAddress').value,
                pickup_pincode: document.getElementById('pickupPin').value,
                delivery_address: document.getElementById('deliveryAddress').value,
                delivery_pincode: document.getElementById('deliveryPin').value,
                service_type: document.getElementById('serviceType').value,
                package_weight: parseFloat(document.getElementById('weight').value),
                order_amount: parseFloat(document.getElementById('orderAmount').value),
                order_status: 'Pending',
                payment_status: 'Pending',
                created_at: new Date().toISOString()
            };

            try {
                const { data, error } = await sbClient
                    .from('orders')
                    .insert([orderData]);

                if (error) throw error;

                document.getElementById('createMsg').innerHTML = '<div class="success-msg">✅ Order created successfully!</div>';
                e.target.reset();
                setTimeout(() => loadOrders(), 1000);
            } catch (error) {
                document.getElementById('createMsg').innerHTML = `<div class="error-msg">❌ ${error.message}</div>`;
            }
        }

        async function loadOrders() {
            document.getElementById('ordersLoading').style.display = 'block';
            try {
                const { data, error } = await sbClient
                    .from('orders')
                    .select('*')
                    .eq('employee_id', currentEmployee);

                if (error) throw error;

                const html = data.map(order => `
                    <div class="order-card">
                        <h4>Order #${order.id}</h4>
                        <p><strong>Customer:</strong> ${order.customer_name}</p>
                        <p><strong>From:</strong> ${order.pickup_address} (${order.pickup_pincode})</p>
                        <p><strong>To:</strong> ${order.delivery_address} (${order.delivery_pincode})</p>
                        <p><strong>Amount:</strong> ₹${order.order_amount}</p>
                        <p><strong>Status:</strong> ${order.order_status}</p>
                    </div>
                `).join('');

                document.getElementById('ordersList').innerHTML = html || '<p>No orders yet</p>';

                // Update invoice dropdown
                const select = document.getElementById('invoiceOrderSelect');
                select.innerHTML = '<option value="">Select Order</option>' + 
                    data.map(o => `<option value="${o.id}">${o.customer_name} - ${o.id}</option>`).join('');

            } catch (error) {
                document.getElementById('ordersList').innerHTML = `<div class="error-msg">${error.message}</div>`;
            }
            document.getElementById('ordersLoading').style.display = 'none';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            event.target.classList.add('active');

            if (tab === 'orders') {
                loadOrders();
            }
        }

        function loadInvoice() {
            const orderId = document.getElementById('invoiceOrderSelect').value;
            if (orderId) {
                document.getElementById('invoicePreview').style.display = 'block';
                document.getElementById('invoiceFrame').src = `/tax-invoice.html?id=${orderId}`;
            }
        }

        function handleLogout() {
            currentEmployee = null;
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('empId').value = '';
            document.getElementById('empPassword').value = '';
        }
    </script>
</body>
</html>
